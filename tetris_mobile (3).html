<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Tetris LINE Offline</title>
<style>
html, body {
  margin:0;
  padding:0;
  height:100%;
  background:#111;
  overflow:hidden;
  touch-action:none;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  color:#fff;
  font-family:sans-serif;
}
canvas { background:#000; touch-action:none; }
.controls { margin-top:10px; display:grid; grid-template-columns:repeat(3,80px); gap:10px; }
button { padding:15px; font-size:16px; border:none; border-radius:10px; background:#333; color:#fff; }
button:active { background:#555; }
#info { margin-top:10px; }
</style>
</head>
<body>

<canvas id="tetris" width="300" height="600"></canvas>
<div id="info">Score: 0</div>

<div class="controls">
  <button id="left">◀</button>
  <button id="rotate">⟳</button>
  <button id="right">▶</button>
  <button id="down">▼</button>
  <button id="drop">⤓</button>
</div>

<script>
window.onload = () => {

// ===== AUDIO (Offline WebAudio) =====
let audioCtx;
let musicStarted = false;

function startMusic(){
  if(musicStarted) return;
  audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  musicStarted = true;

  const playTone = (freq, time, duration) => {
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.frequency.value = freq;
    osc.connect(gain);
    gain.connect(audioCtx.destination);
    osc.start(time);
    osc.stop(time + duration);
  };

  // simple loop melody
  const loop = () => {
    const now = audioCtx.currentTime;
    playTone(261.6, now, 0.2);
    playTone(329.6, now + 0.2, 0.2);
    playTone(392.0, now + 0.4, 0.2);
    playTone(523.3, now + 0.6, 0.2);
    setTimeout(loop, 800);
  };

  loop();
}

function sound(freq){
  if(!audioCtx) return;
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.frequency.value = freq;
  osc.connect(gain);
  gain.connect(audioCtx.destination);
  osc.start();
  osc.stop(audioCtx.currentTime + 0.1);
}

// start music on first interaction
window.addEventListener('touchstart', startMusic, {once:true});
window.addEventListener('click', startMusic, {once:true});

// ===== GAME =====
const canvas = document.getElementById("tetris");
const ctx = canvas.getContext("2d");

const COLS=10, ROWS=20, BLOCK=30;
ctx.scale(BLOCK,BLOCK);

const colors=[null,'cyan','blue','orange','yellow','green','purple','red'];

function createMatrix(w,h){
  const m=[];
  while(h--) m.push(new Array(w).fill(0));
  return m;
}

function createPiece(t){
  switch(t){
    case 'T': return [[0,0,0],[1,1,1],[0,1,0]];
    case 'O': return [[2,2],[2,2]];
    case 'L': return [[0,3,0],[0,3,0],[0,3,3]];
    case 'J': return [[0,4,0],[0,4,0],[4,4,0]];
    case 'I': return [[0,5,0,0],[0,5,0,0],[0,5,0,0],[0,5,0,0]];
    case 'S': return [[0,6,6],[6,6,0],[0,0,0]];
    case 'Z': return [[7,7,0],[0,7,7],[0,0,0]];
  }
}

const arena=createMatrix(COLS,ROWS);

const player={pos:{x:0,y:0},matrix:null,score:0};

function collide(arena,player){
  const m=player.matrix;
  const o=player.pos;
  for(let y=0;y<m.length;y++){
    for(let x=0;x<m[y].length;x++){
      if(m[y][x]!==0 && (arena[y+o.y] && arena[y+o.y][x+o.x])!==0) return true;
    }
  }
  return false;
}

function merge(arena,player){
  player.matrix.forEach((row,y)=>{
    row.forEach((val,x)=>{
      if(val!==0) arena[y+player.pos.y][x+player.pos.x]=val;
    });
  });
}

function arenaSweep(){
  outer: for(let y=arena.length-1;y>=0;y--){
    for(let x=0;x<arena[y].length;x++){
      if(arena[y][x]===0) continue outer;
    }
    arena.splice(y,1);
    arena.unshift(new Array(COLS).fill(0));
    player.score+=10;
    y++;
    sound(800);
  }
}

function rotate(matrix){
  for(let y=0;y<matrix.length;y++){
    for(let x=0;x<y;x++){
      [matrix[x][y],matrix[y][x]]=[matrix[y][x],matrix[x][y]];
    }
  }
  matrix.forEach(r=>r.reverse());
}

function playerRotate(){
  rotate(player.matrix);
  if(collide(arena,player)){
    rotate(player.matrix);
    rotate(player.matrix);
    rotate(player.matrix);
  } else sound(600);
}

function playerMove(dir){
  player.pos.x+=dir;
  if(collide(arena,player)) player.pos.x-=dir;
  else sound(400);
}

function playerDrop(){
  player.pos.y++;
  if(collide(arena,player)){
    player.pos.y--;
    merge(arena,player);
    playerReset();
    arenaSweep();
    updateScore();
  }
  dropCounter=0;
  sound(300);
}

function playerReset(){
  const pieces='TJLOSZI';
  player.matrix=createPiece(pieces[Math.random()*pieces.length|0]);
  player.pos.y=0;
  player.pos.x=(COLS/2|0)-(player.matrix[0].length/2|0);
  if(collide(arena,player)){
    arena.forEach(r=>r.fill(0));
    player.score=0;
  }
}

function drawMatrix(matrix,offset){
  matrix.forEach((row,y)=>{
    row.forEach((val,x)=>{
      if(val!==0){
        ctx.fillStyle=colors[val];
        ctx.fillRect(x+offset.x,y+offset.y,1,1);
      }
    });
  });
}

function draw(){
  ctx.fillStyle="#000";
  ctx.fillRect(0,0,canvas.width,canvas.height);
  drawMatrix(arena,{x:0,y:0});
  drawMatrix(player.matrix,player.pos);
}

let dropCounter=0;
let dropInterval=500;
let lastTime=0;

function update(time=0){
  const delta=time-lastTime;
  lastTime=time;
  dropCounter+=delta;
  if(dropCounter>dropInterval) playerDrop();
  draw();
  requestAnimationFrame(update);
}

function updateScore(){
  document.getElementById("info").innerText="Score: "+player.score;
}

// Controls
left.onclick=()=>playerMove(-1);
right.onclick=()=>playerMove(1);
down.onclick=()=>playerDrop();
rotate.onclick=()=>playerRotate();
drop.onclick=()=>{
  while(!collide(arena,player)) player.pos.y++;
  player.pos.y--;
  playerDrop();
};

// Touch swipe
let sx=0,sy=0;
canvas.addEventListener("touchstart",e=>{
  const t=e.touches[0];
  sx=t.clientX; sy=t.clientY;
},{passive:false});
canvas.addEventListener("touchend",e=>{
  const t=e.changedTouches[0];
  const dx=t.clientX-sx;
  const dy=t.clientY-sy;
  if(Math.abs(dx)>Math.abs(dy)){
    if(dx>0) playerMove(1);
    else playerMove(-1);
  }else{
    if(dy>0) playerDrop();
    else playerRotate();
  }
},{passive:false});

playerReset();
updateScore();
update();

};
</script>
</body>
</html>
